groups:
  - name: host-alerts
    rules:
      - alert: HostMetricsMissing
        expr: |
          max by (job, host) (present_over_time(node_time_seconds[24h]))
          unless on (job, host)
          max by (job, host) (present_over_time(node_time_seconds[10m]))
        for: 0m
        keep_firing_for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Host metrics missing: {{ $labels.job }} / {{ $labels.host }}"
          description: "No node_exporter metrics have been received from {{ $labels.job }} / {{ $labels.host }} for more than 10 minutes."

      - alert: NodeExporterDown
        expr: up{host!="",instance!~".+-vmagent"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "node_exporter is down: {{ $labels.job }} / {{ $labels.host }}"
          description: "vmagent cannot scrape node_exporter on {{ $labels.job }} / {{ $labels.host }}."

      - alert: HostHighCpuUsage
        expr: 100 - (avg by (job, host) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage: {{ $labels.job }} / {{ $labels.host }}"
          description: "CPU usage on {{ $labels.job }} / {{ $labels.host }} is above 85% for 10 minutes."

      - alert: HostHighMemoryUsage
        expr: |
          (
            1 - (
              max by (job, host) (node_memory_MemAvailable_bytes)
              /
              max by (job, host) (node_memory_MemTotal_bytes)
            )
          ) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage: {{ $labels.job }} / {{ $labels.host }}"
          description: "Memory usage on {{ $labels.job }} / {{ $labels.host }} is above 90% for 10 minutes."

      - alert: HostLowDiskSpace
        expr: |
          (
            1 - (
              node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|overlay|parsecfs|squashfs",mountpoint!~"/run.*|/tmp/s2snext_dialog_handler.*|/var/lib/docker/.+"}
              /
              node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|overlay|parsecfs|squashfs",mountpoint!~"/run.*|/tmp/s2snext_dialog_handler.*|/var/lib/docker/.+"}
            )
          ) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space: {{ $labels.job }} / {{ $labels.host }} {{ $labels.mountpoint }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.job }} / {{ $labels.host }} is more than 85% full."

      - alert: HostHighLoad
        expr: node_load15 / on (job, host) group_left count by (job, host) (node_cpu_seconds_total{mode="idle"}) > 1.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High load average: {{ $labels.job }} / {{ $labels.host }}"
          description: "15-minute load average on {{ $labels.job }} / {{ $labels.host }} is high relative to CPU count."
