services:
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - prometheus
      - alertmanager
      - grafana

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-remote-write-receiver
      - --web.external-url=https://${MONITOR_DOMAIN}/prometheus
      - --web.route-prefix=/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    env_file: .env
    entrypoint:
      - /bin/sh
      - /etc/alertmanager/render-and-run.sh
    command:
      - --config.file=/tmp/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=https://${MONITOR_DOMAIN}/alertmanager
      - --web.route-prefix=/alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml.tpl:/etc/alertmanager/alertmanager.yml.tpl:ro
      - ./alertmanager/render-and-run.sh:/etc/alertmanager/render-and-run.sh:ro
      - alertmanager_data:/alertmanager

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://${MONITOR_DOMAIN}/
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  alertmanager_data:
  caddy_config:
  caddy_data:
  grafana_data:
  prometheus_data:
